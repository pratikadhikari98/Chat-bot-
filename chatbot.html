<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chatbot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-top:       #FFFFFF;
    --bg-bottom:    #CFE9FB;
    --panel:        #FFFFFF;
    --panel-raised: #F4FAFF;
    --user-grad-1:  #4FC3F7;
    --user-grad-2:  #1E88E5;
    --bot-bubble:   #EEF6FC;
    --accent:       #1E88E5;
    --text-main:    #1B2836;
    --text-dim:     #7488A0;
    --border:       #DCEBF7;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Inter', Arial, sans-serif;
    background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    padding: 16px;
  }

  .chat-container {
    width: 100%;
    max-width: 460px;
    height: min(92vh, 780px);
    background: var(--panel);
    border-radius: 22px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: 0 20px 50px rgba(30, 136, 229, 0.18);
  }

  .chat-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 18px;
    background: var(--panel-raised);
    border-bottom: 1px solid var(--border);
  }

  .bot-avatar {
    width: 42px;
    height: 42px;
    border-radius: 13px;
    background: linear-gradient(135deg, var(--user-grad-1), var(--user-grad-2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: white;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  .header-text { flex: 1; }

  .header-text h1 {
    font-family: 'Poppins', sans-serif;
    font-size: 16px;
    color: var(--text-main);
    font-weight: 600;
  }

  .header-text p {
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 2px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #34C759;
    box-shadow: 0 0 6px #34C759;
  }

  .settings-btn {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s;
  }

  .settings-btn:hover { background: var(--bot-bubble); }
  .settings-btn svg { width: 18px; height: 18px; }

  .chat-messages {
    flex: 1;
    padding: 20px 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
    background: var(--panel);
  }

  .chat-messages::-webkit-scrollbar { width: 5px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

  .row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    max-width: 84%;
    animation: rise 0.28s ease;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .row.user { align-self: flex-end; flex-direction: row-reverse; }
  .row.bot  { align-self: flex-start; }

  .mini-avatar {
    width: 26px;
    height: 26px;
    border-radius: 8px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    font-family: 'Poppins', sans-serif;
    background: var(--bot-bubble);
    color: var(--user-grad-2);
  }

  .row.user .mini-avatar {
    background: linear-gradient(135deg, var(--user-grad-1), var(--user-grad-2));
    color: white;
  }

  .message {
    padding: 11px 15px;
    border-radius: 16px;
    font-size: 14.5px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .user .message {
    background: linear-gradient(135deg, var(--user-grad-1), var(--user-grad-2));
    color: white;
    border-bottom-right-radius: 4px;
  }

  .bot .message {
    background: var(--bot-bubble);
    color: var(--text-main);
    border-bottom-left-radius: 4px;
  }

  .typing-row {
    align-self: flex-start;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .typing-bubble {
    background: var(--bot-bubble);
    padding: 12px 16px;
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    display: flex;
    gap: 4px;
  }

  .typing-bubble span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
    animation: bounce 1.1s infinite ease-in-out;
  }

  .typing-bubble span:nth-child(2) { animation-delay: 0.15s; }
  .typing-bubble span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  .chat-input-area {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    background: var(--panel-raised);
    border-top: 1px solid var(--border);
    gap: 10px;
  }

  #userInput {
    flex: 1;
    padding: 12px 16px;
    border-radius: 24px;
    border: 1.5px solid var(--border);
    outline: none;
    background: white;
    color: var(--text-main);
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    transition: border-color 0.2s;
  }

  #userInput:focus {
    border-color: var(--user-grad-2);
  }

  #userInput::placeholder {
    color: var(--text-dim);
  }

  #sendBtn {
    background: linear-gradient(135deg, var(--user-grad-1), var(--user-grad-2));
    color: white;
    border: none;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s, opacity 0.15s;
  }

  #sendBtn:hover { transform: scale(1.06); }
  #sendBtn:active { transform: scale(0.94); }

  #sendBtn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  #sendBtn svg { width: 18px; height: 18px; }

  /* ---------- Settings Modal ---------- */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(20, 40, 60, 0.35);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10;
    padding: 20px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: white;
    border-radius: 18px;
    width: 100%;
    max-width: 380px;
    padding: 22px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }

  .modal h2 {
    font-family: 'Poppins', sans-serif;
    font-size: 17px;
    color: var(--text-main);
    margin-bottom: 4px;
  }

  .modal .sub {
    font-size: 12.5px;
    color: var(--text-dim);
    margin-bottom: 16px;
    line-height: 1.4;
  }

  .field { margin-bottom: 14px; }

  .field label {
    display: block;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--text-main);
    margin-bottom: 6px;
  }

  .field select,
  .field input {
    width: 100%;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    outline: none;
    font-size: 13.5px;
    background: var(--panel-raised);
    color: var(--text-main);
    font-family: 'Inter', sans-serif;
  }

  .field select:focus,
  .field input:focus {
    border-color: var(--user-grad-2);
  }

  .field .hint {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 5px;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 18px;
  }

  .modal-actions button {
    flex: 1;
    padding: 11px;
    border-radius: 10px;
    border: none;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
  }

  #cancelSettings {
    background: var(--panel-raised);
    color: var(--text-main);
    border: 1.5px solid var(--border);
  }

  #saveSettings {
    background: linear-gradient(135deg, var(--user-grad-1), var(--user-grad-2));
    color: white;
  }

  .session-note {
    font-size: 10.5px;
    color: var(--text-dim);
    margin-top: 12px;
    text-align: center;
  }
</style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    <div class="bot-avatar">AI</div>
    <div class="header-text">
      <h1>AI Chatbot</h1>
      <p><span class="status-dot"></span> <span id="providerLabel">Groq · llama-3.1-8b-instant</span></p>
    </div>
  </div>

  <div class="chat-messages" id="chatMessages">
    <div class="row bot">
      <div class="mini-avatar">AI</div>
      <div class="message">नमस्ते! म तपाईंलाई कसरी सहयोग गर्न सक्छु? (⚙️ Settings मा गएर API प्रदायक र key राख्नुहोस्)</div>
    </div>
  </div>

  <div class="chat-input-area">
    <input type="text" id="userInput" placeholder="आफ्नो सन्देश टाइप गर्नुहोस्...">
    <button id="sendBtn" aria-label="Send">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 11.5L21 3L12.5 21L10.5 13.5L3 11.5Z" stroke="white" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
</div>

<script>
  // ---------------- Provider configs ----------------
  const PROVIDERS = {
    groq: {
      label: "Groq",
      type: "openai",
      endpoint: "https://api.groq.com/openai/v1/chat/completions",
      defaultModel: "llama-3.1-8b-instant",
      suggestions: ["llama-3.1-8b-instant", "llama-3.3-70b-versatile", "gemma2-9b-it"],
      hint: "उदाहरण: llama-3.1-8b-instant (छिटो) वा llama-3.3-70b-versatile (शक्तिशाली)"
    },
    gemini: {
      label: "Google Gemini",
      type: "gemini",
      endpoint: "https://generativelanguage.googleapis.com/v1beta/models/{model}:generateContent",
      defaultModel: "gemini-1.5-flash",
      suggestions: ["gemini-1.5-flash", "gemini-1.5-pro", "gemini-2.0-flash"],
      hint: "Google AI Studio बाट free API key लिनुहोस्"
    },
    openrouter: {
      label: "OpenRouter",
      type: "openai",
      endpoint: "https://openrouter.ai/api/v1/chat/completions",
      defaultModel: "meta-llama/llama-3.1-8b-instruct:free",
      suggestions: [
        "meta-llama/llama-3.1-8b-instruct:free",
        "mistralai/mistral-7b-instruct:free",
        "google/gemini-flash-1.5:free"
      ],
      hint: "':free' भएका models बिना खर्च चल्छन्"
    },
    huggingface: {
      label: "Hugging Face",
      type: "hf",
      endpoint: "https://api-inference.huggingface.co/models/{model}",
      defaultModel: "HuggingFaceH4/zephyr-7b-beta",
      suggestions: ["HuggingFaceH4/zephyr-7b-beta", "mistralai/Mistral-7B-Instruct-v0.2"],
      hint: "नोट: सबै HF models chat format मा एउटै तरिकाले काम नगर्न सक्छन्"
    }
  };

  // ============================================================
  // 🔧 यहाँ आफ्नो setting राख्नुहोस् (testing को लागि hardcoded)
  // provider options: "groq" | "gemini" | "openrouter" | "huggingface"
  // ============================================================
  let currentConfig = {
    provider: "groq",
    apiKey: "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",     // <-- आफ्नो API key यहाँ राख्नुहोस्
    model: PROVIDERS.groq.defaultModel   // <-- चाहेमा model पनि बदल्न सकिन्छ
  };
  // ============================================================

  const SYSTEM_PROMPT = "तपाईं एक friendly AI assistant हुनुहुन्छ। नेपाली वा अंग्रेजी जुन भाषामा प्रश्न आउँछ, त्यही भाषामा छोटो र स्पष्ट जवाफ दिनुहोस्।";

  let conversationHistory = [
    { role: "system", content: SYSTEM_PROMPT }
  ];

  const chatMessages   = document.getElementById("chatMessages");
  const userInput      = document.getElementById("userInput");
  const sendBtn        = document.getElementById("sendBtn");
  const providerLabel  = document.getElementById("providerLabel");

  providerLabel.textContent = PROVIDERS[currentConfig.provider].label + " · " + currentConfig.model;

  // ---------------- Chat UI helpers ----------------
  function addMessage(text, sender) {
    const row = document.createElement("div");
    row.classList.add("row", sender === "user" ? "user" : "bot");

    const avatar = document.createElement("div");
    avatar.classList.add("mini-avatar");
    avatar.textContent = sender === "user" ? "तपाई" : "AI";

    const msgDiv = document.createElement("div");
    msgDiv.classList.add("message");
    msgDiv.textContent = text;

    row.appendChild(avatar);
    row.appendChild(msgDiv);
    chatMessages.appendChild(row);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function showTyping() {
    const row = document.createElement("div");
    row.classList.add("row", "bot", "typing-row");
    row.id = "typingIndicator";

    const avatar = document.createElement("div");
    avatar.classList.add("mini-avatar");
    avatar.textContent = "AI";

    const bubble = document.createElement("div");
    bubble.classList.add("typing-bubble");
    bubble.innerHTML = "<span></span><span></span><span></span>";

    row.appendChild(avatar);
    row.appendChild(bubble);
    chatMessages.appendChild(row);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function removeTyping() {
    const typingDiv = document.getElementById("typingIndicator");
    if (typingDiv) typingDiv.remove();
  }

  // ---------------- Request builders per provider ----------------
  async function callProvider() {
    const cfg = PROVIDERS[currentConfig.provider];

    if (cfg.type === "openai") {
      const res = await fetch(cfg.endpoint, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + currentConfig.apiKey
        },
        body: JSON.stringify({
          model: currentConfig.model,
          messages: conversationHistory,
          temperature: 0.7,
          max_tokens: 512
        })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
      return data.choices[0].message.content;
    }

    if (cfg.type === "gemini") {
      const url = cfg.endpoint.replace("{model}", currentConfig.model) + "?key=" + currentConfig.apiKey;
      const contents = conversationHistory
        .filter(m => m.role !== "system")
        .map(m => ({
          role: m.role === "assistant" ? "model" : "user",
          parts: [{ text: m.content }]
        }));
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] },
          contents: contents
        })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
      return data.candidates[0].content.parts[0].text;
    }

    if (cfg.type === "hf") {
      const url = cfg.endpoint.replace("{model}", currentConfig.model);
      const lastUserMsg = conversationHistory[conversationHistory.length - 1].content;
      const res = await fetch(url, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + currentConfig.apiKey
        },
        body: JSON.stringify({
          inputs: lastUserMsg,
          parameters: { max_new_tokens: 400, return_full_text: false }
        })
      });
      const data = await res.json();
      if (data.error) throw new Error(typeof data.error === "string" ? data.error : JSON.stringify(data.error));
      if (Array.isArray(data) && data[0] && data[0].generated_text) return data[0].generated_text;
      return typeof data === "string" ? data : JSON.stringify(data);
    }
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    if (!currentConfig.apiKey || currentConfig.apiKey === "YOUR_NEW_API_KEY_HERE") {
      addMessage("Code मा API key राखिएको छैन। Script को माथिल्लो भागमा भएको currentConfig मा key राख्नुहोस्।", "bot");
      return;
    }

    addMessage(text, "user");
    conversationHistory.push({ role: "user", content: text });
    userInput.value = "";
    sendBtn.disabled = true;
    showTyping();

    try {
      const botReply = await callProvider();
      removeTyping();
      addMessage(botReply, "bot");
      conversationHistory.push({ role: "assistant", content: botReply });
    } catch (err) {
      removeTyping();
      addMessage("त्रुटि: " + err.message, "bot");
      console.error(err);
    }

    sendBtn.disabled = false;
    userInput.focus();
  }

  sendBtn.addEventListener("click", sendMessage);
  userInput.addEventListener("keypress", function(e) {
    if (e.key === "Enter") sendMessage();
  });

  // init
  refreshModelSuggestions();
</script>

</body>
</html>

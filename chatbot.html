<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>चाट बोट</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #1e293b, #0f172a);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    width: 100%;
    max-width: 480px;
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 85vh;
  }
  .header {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white;
    padding: 16px 20px;
    font-size: 18px;
    font-weight: 600;
  }
  .settings {
    padding: 12px 16px;
    background: #f1f5f9;
    border-bottom: 1px solid #e2e8f0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .settings input, .settings select {
    padding: 8px 10px;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
    font-size: 13px;
    outline: none;
  }
  .settings input:focus, .settings select:focus {
    border-color: #6366f1;
  }
  .settings-row {
    display: flex;
    gap: 8px;
  }
  .settings-row input { flex: 1; }
  .settings small { color: #64748b; font-size: 11px; }

  .chat-window {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: #f8fafc;
  }
  .msg {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.4;
    white-space: pre-wrap;
  }
  .msg.user {
    align-self: flex-end;
    background: #6366f1;
    color: white;
    border-bottom-right-radius: 4px;
  }
  .msg.bot {
    align-self: flex-start;
    background: #e2e8f0;
    color: #1e293b;
    border-bottom-left-radius: 4px;
  }
  .msg.typing {
    align-self: flex-start;
    background: #e2e8f0;
    color: #64748b;
    font-style: italic;
  }
  .input-area {
    display: flex;
    padding: 12px;
    gap: 8px;
    background: white;
    border-top: 1px solid #e2e8f0;
  }
  .input-area textarea {
    flex: 1;
    resize: none;
    border: 1px solid #cbd5e1;
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    max-height: 90px;
  }
  .input-area textarea:focus { border-color: #6366f1; }
  .input-area button {
    background: #6366f1;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 0 18px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .input-area button:hover { background: #4f46e5; }
  .input-area button:disabled { background: #a5a6f5; cursor: not-allowed; }
</style>
</head>
<body>

<div class="container">
  <div class="header">🤖 मेरो चाट बोट</div>

  <div class="settings">
    <div class="settings-row">
      <select id="provider">
        <option value="openai">OpenAI (ChatGPT)</option>
        <option value="anthropic">Anthropic (Claude)</option>
        <option value="gemini">Google Gemini (AI Studio)</option>
      </select>
      <input type="text" id="model" placeholder="model नाम (जस्तै: gpt-4o-mini)">
    </div>
    <input type="password" id="apiKey" placeholder="आफ्नो API Key यहाँ राख्नुहोस्">
    <small>⚠️ API key ब्राउजरमै राखिन्छ, पेज रिफ्रेस गर्दा हराउँछ। यो फाइल केवल तपाईंको प्रयोगको लागि हो — यसलाई सार्वजनिक साइटमा राख्दा आफ्नो key कसैलाई नदेखियोस् भनी ध्यान दिनुहोस्।</small>
  </div>

  <div class="chat-window" id="chatWindow">
    <div class="msg bot">नमस्ते! म तपाईंको सहायक बोट हुँ। माथि आफ्नो API key राखेर कुरा सुरु गर्नुहोस्।</div>
  </div>

  <div class="input-area">
    <textarea id="userInput" rows="1" placeholder="सन्देश लेख्नुहोस्..."></textarea>
    <button id="sendBtn">पठाउनुहोस्</button>
  </div>
</div>

<script>
const chatWindow = document.getElementById('chatWindow');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const apiKeyInput = document.getElementById('apiKey');
const providerSelect = document.getElementById('provider');
const modelInput = document.getElementById('model');

let conversationHistory = [];

function addMessage(text, sender) {
  const div = document.createElement('div');
  div.className = 'msg ' + sender;
  div.textContent = text;
  chatWindow.appendChild(div);
  chatWindow.scrollTop = chatWindow.scrollHeight;
  return div;
}

async function sendMessage() {
  const text = userInput.value.trim();
  const apiKey = apiKeyInput.value.trim();
  const provider = providerSelect.value;
  let model = modelInput.value.trim();

  if (!text) return;
  if (!apiKey) {
    addMessage('कृपया पहिले माथि आफ्नो API Key राख्नुहोस्।', 'bot');
    return;
  }

  addMessage(text, 'user');
  conversationHistory.push({ role: 'user', content: text });
  userInput.value = '';
  sendBtn.disabled = true;

  const typingDiv = addMessage('लेख्दैछ...', 'typing');

  try {
    let replyText = '';

    if (provider === 'openai') {
      if (!model) model = 'gpt-4o-mini';
      const res = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + apiKey
        },
        body: JSON.stringify({
          model: model,
          messages: conversationHistory
        })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      replyText = data.choices[0].message.content;

    } else if (provider === 'anthropic') {
      if (!model) model = 'claude-sonnet-4-6';
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: model,
          max_tokens: 1000,
          messages: conversationHistory
        })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      replyText = data.content.map(c => c.text || '').join('\n');

    } else if (provider === 'gemini') {
      if (!model) model = 'gemini-2.0-flash';
      // Gemini ले "contents" संरचना चाहन्छ, role हरू 'user'/'model' हुन्छन्
      const geminiContents = conversationHistory.map(m => ({
        role: m.role === 'assistant' ? 'model' : 'user',
        parts: [{ text: m.content }]
      }));
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: geminiContents })
        }
      );
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      replyText = data.candidates[0].content.parts.map(p => p.text || '').join('\n');
    }

    typingDiv.remove();
    addMessage(replyText, 'bot');
    conversationHistory.push({ role: 'assistant', content: replyText });

  } catch (err) {
    typingDiv.remove();
    addMessage('त्रुटि आयो: ' + err.message, 'bot');
  } finally {
    sendBtn.disabled = false;
  }
}

sendBtn.addEventListener('click', sendMessage);
userInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
</script>

</body>
</html>
